# A basic configuration file for the 'foot' terminal emulator.
# This file is typically located at ~/.config/foot/foot.ini

[main]
# Set the default shell and font.
shell=bash
font=monospace:size=11
pad=25x10x25x25

# Include pre-defined color themes. This is an alternative to
# manually defining all the colors in the [colors] section below.
# include=/usr/share/foot/themes/solarized-dark

[colors-dark]
# Transparent black, matching the desktop's black field.
alpha=0.68

# Core
background=000000
foreground=9AA6CC

# Normal ANSI colors: dark, cool, low-saturation
regular0=0A0D12
regular1=A46D78
regular2=7F9F83
regular3=B09A6A
regular4=7F8FBD
regular5=9A86B6
regular6=78A6A9
regular7=B8BED3

# Bright ANSI colors: clearer, but still restrained
bright0=465064
bright1=BF8490
bright2=96B79A
bright3=C4AD7A
bright4=A7B6E6
bright5=B3A0D8
bright6=92C2C6
bright7=DEE4F7

[cursor]
style=underline
blink=yes
blink-rate=500
unfocused-style=none
